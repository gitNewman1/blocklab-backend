<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockLab 接口测试页</title>
  <style>
    :root {
      --primary: #2c7a7b;
      --border: #dcdcdc;
      --bg-soft: #f7f9fb;
      --ok-bg: #e8f5e9;
      --ok-bd: #c8e6c9;
      --ok-tx: #1b5e20;
      --err-bg: #ffebee;
      --err-bd: #ffcdd2;
      --err-tx: #b71c1c;
      --loading-bg: #e3f2fd;
      --loading-bd: #bbdefb;
      --loading-tx: #0d47a1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .hint {
      margin: 0 0 16px;
      color: #666;
      font-size: 13px;
    }

    .layout {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }

    .panel {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
      min-height: 640px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      background: var(--bg-soft);
      margin-bottom: 8px;
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-tag {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 12px;
      color: #334155;
      background: #fff;
      white-space: nowrap;
    }

    .api-inline {
      font-size: 13px;
      color: #334155;
      font-weight: normal;
      margin-left: 4px;
    }

    .api-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .api-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .api-row .btn-row {
      flex: none;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    select,
    input[type="file"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: var(--primary);
      color: #fff;
      padding: 9px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .btn-link {
      background: #0f766e;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 4px;
      display: none;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .success { background: var(--ok-bg); border: 1px solid var(--ok-bd); color: var(--ok-tx); }
    .error { background: var(--err-bg); border: 1px solid var(--err-bd); color: var(--err-tx); }
    .loading { background: var(--loading-bg); border: 1px solid var(--loading-bd); color: var(--loading-tx); }

    .field-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: #334155;
      font-weight: normal;
    }

    .inline-check input {
      margin: 0;
    }

    .json-title {
      margin: 8px 0;
      font-size: 14px;
      color: #333;
      font-weight: bold;
    }

    .json-box {
      width: 100%;
      max-width: 100%;
      height: 540px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0f172a;
      color: #d1e7ff;
      padding: 10px;
      overflow-y: auto;
      overflow-x: auto;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre;
    }

    @media (max-width: 980px) {
      .layout {
        flex-direction: column;
      }

      .panel {
        min-height: auto;
      }

      .json-box {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-head">
      <div>
        <h1>BlockLab 接口测试页</h1>
        <p class="hint">本页仅保留上传、清理、删除、联动等操作流程；普通接口调试请跳转 Swagger UI。</p>
      </div>
      <div class="btn-row">
        <button type="button" id="btnOpenSwaggerUi" class="btn-link">打开 Swagger UI</button>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>左侧：单个模型上传</h2>

        <div class="card" id="createModelTypeCard">
          <h3>添加模型类型 <span class="api-inline">/api/admin/model-types/create</span></h3>
          <div class="form-group">
            <label for="createModelTypeName">类型名称</label>
            <input type="text" id="createModelTypeName" placeholder="例如：交通工具">
          </div>
          <button type="button" id="btnCreateModelType">添加类型</button>
          <div id="createModelTypeStatus" class="status"></div>
        </div>

        <form id="uploadForm" class="card">
          <h3>单个模型上传 <span class="api-inline">/api/admin/models/upload</span></h3>

          <div class="form-group">
            <label for="name">模型名称</label>
            <input type="text" id="name" name="name" required placeholder="例如：蜗牛模型">
          </div>

          <div class="form-group">
            <label for="modelTypeSelect">模型类型</label>
            <select id="modelTypeSelect" name="model_type_id" required>
              <option value="">正在加载类型...</option>
            </select>
            <div id="modelTypeHint" class="field-hint">页面加载后会自动从服务器获取类型列表。</div>
          </div>

          <div class="form-group">
            <label for="ioFile">.io 文件</label>
            <input type="file" id="ioFile" name="io_file" accept=".io" required>
          </div>

          <div class="form-group">
            <label for="glbFile">.glb 文件</label>
            <input type="file" id="glbFile" name="glb_file" accept=".glb" required>
          </div>

          <div class="form-group">
            <label for="manualFile">安装说明书（可选）</label>
            <input type="file" id="manualFile" name="manual_file" accept=".pdf,application/pdf">
          </div>

          <button type="submit" id="uploadSubmitBtn">上传</button>
          <div id="uploadStatus" class="status"></div>
        </form>

        <div class="card" id="createModelCard">
          <h3>手动创建模型 <span class="api-inline">/api/admin/models/create</span></h3>
          <div class="form-group">
            <label for="createName">模型名称</label>
            <input type="text" id="createName" placeholder="例如：蜗牛模型">
          </div>
          <div class="form-group">
            <label for="createParts">零件列表（JSON）</label>
            <textarea id="createParts">[
  { "designID": "3001", "quantity": 4 },
  { "designID": "3020", "quantity": 2 }
]</textarea>
          </div>
          <button type="button" id="btnCreateModel">创建</button>
          <div id="createStatus" class="status"></div>
        </div>
      </section>

      <section class="panel">
        <h2>右侧：操作流与结果</h2>

        <div class="card">
          <div class="card-head">
            <h3>数据清理：<span class="api-inline">/api/admin/data/*</span></h3>
          </div>
          <div class="btn-row">
            <button type="button" id="btnClearModels">清空模型数据</button>
            <button type="button" id="btnClearModelTypes">清空类型数据</button>
            <button type="button" id="btnClearUsers">清空用户数据</button>
          </div>
          <label class="inline-check">
            <input type="checkbox" id="deleteModelFilesInput">
            清空或删除模型数据时，同时删除 uploads/io-files、models-3d、thumbnails、manuals 中的历史文件
          </label>
          <div class="api-row" style="margin-top: 10px;">
            <div class="form-group">
              <label for="deleteModelIdInput">删除指定模型 ID</label>
              <input type="number" id="deleteModelIdInput" min="1" placeholder="例如：1">
            </div>
            <div class="btn-row">
              <button type="button" id="btnDeleteModelById">删除模型</button>
            </div>
          </div>
          <div class="api-row">
            <div class="form-group">
              <label for="deleteModelTypeIdInput">删除指定类型 ID</label>
              <input type="number" id="deleteModelTypeIdInput" min="1" placeholder="例如：1">
            </div>
            <div class="btn-row">
              <button type="button" id="btnDeleteModelTypeById">删除类型</button>
            </div>
          </div>
          <div class="api-row">
            <div class="form-group">
              <label for="deleteUserIdInput">删除指定用户 ID</label>
              <input type="text" id="deleteUserIdInput" placeholder="例如：uuid">
            </div>
            <div class="btn-row">
              <button type="button" id="btnDeleteUserById">删除用户</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3>图片识别匹配：<span class="api-inline">/api/recognition/match</span></h3>
            <div class="card-tools">
              <button type="button" id="btnImageMatch">调用 POST</button>
            </div>
          </div>
          <div class="form-group">
            <label for="imageMatchUrlInput">图片 URL（可选，和本地图片二选一）</label>
            <input
              type="text"
              id="imageMatchUrlInput"
              value="https://agc-storage-drcn.platform.dbankcloud.cn/v0/block-lzohr/1234.jpg"
              placeholder="例如：https://example.com/lego.jpg"
            >
          </div>
          <div class="form-group">
            <label for="imageMatchFileInput">本地图片文件（可选，和图片 URL 二选一）</label>
            <input type="file" id="imageMatchFileInput" accept=".jpg,.jpeg,.png,.webp,image/*">
          </div>
          <div class="api-row">
            <div class="form-group">
              <label for="imageMatchMinConfidenceInput">min_confidence（0-1）</label>
              <input type="number" id="imageMatchMinConfidenceInput" step="0.01" min="0" max="1" value="0.6">
            </div>
            <div class="form-group">
              <label for="imageMatchTopKInput">top_k</label>
              <input type="number" id="imageMatchTopKInput" min="1" max="20" value="4">
            </div>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="imageMatchIncludeModelDetailInput">
              include_model_detail（返回最佳匹配模型步骤与零件详情）
            </label>
          </div>
        </div>

        <div id="apiStatus" class="status"></div>
        <div class="json-title">操作结果 JSON</div>
        <pre id="apiJsonOutput" class="json-box">{}</pre>
      </section>
    </div>
  </div>

  <script>
    const SWAGGER_UI_URL = '/docs';
    const API_UPLOAD_URL = '/api/admin/models/upload';
    const API_CREATE_URL = '/api/admin/models/create';
    const API_CREATE_MODEL_TYPE_URL = '/api/admin/model-types/create';
    const API_MODEL_TYPES_URL = '/api/model-types';
    const API_CLEAR_MODELS_URL = '/api/admin/data/clear-models';
    const API_CLEAR_MODEL_TYPES_URL = '/api/admin/data/clear-model-types';
    const API_CLEAR_USERS_URL = '/api/admin/data/clear-users';
    const API_DELETE_MODEL_URL = '/api/admin/data/delete-model';
    const API_DELETE_MODEL_TYPE_URL = '/api/admin/data/delete-model-type';
    const API_DELETE_USER_URL = '/api/admin/data/delete-user';
    const API_RECOGNITION_IMAGE_MATCH_URL = '/api/recognition/match';

    function setStatus(el, type, text) {
      el.className = `status ${type}`;
      el.style.display = 'block';
      el.textContent = text;
    }

    function setJsonOutput(data) {
      const box = document.getElementById('apiJsonOutput');
      box.textContent = JSON.stringify(data, null, 2);
      box.scrollTop = 0;
      box.scrollLeft = 0;
    }

    function formatElapsed(startedAt) {
      const elapsedMs = Math.max(0, performance.now() - startedAt);
      return `${elapsedMs.toFixed(0)} ms`;
    }

    function setModelTypeHint(text) {
      document.getElementById('modelTypeHint').textContent = text;
    }

    function populateModelTypeOptions(modelTypes) {
      const select = document.getElementById('modelTypeSelect');
      select.innerHTML = '';

      if (!Array.isArray(modelTypes) || modelTypes.length === 0) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '暂无可选类型';
        select.appendChild(option);
        select.value = '';
        setModelTypeHint('当前没有可选类型，建议先添加类型。');
        return;
      }

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '请选择模型类型';
      select.appendChild(placeholder);

      for (const modelType of modelTypes) {
        const option = document.createElement('option');
        option.value = String(modelType.id);
        option.textContent = modelType.name;
        select.appendChild(option);
      }

      select.value = '';
      setModelTypeHint(`已加载 ${modelTypes.length} 个类型。下拉框只显示类型名称，上传时仅提交类型 ID。`);
    }

    async function loadModelTypesForUpload() {
      const select = document.getElementById('modelTypeSelect');
      select.disabled = true;
      setModelTypeHint('正在从服务器加载类型列表...');

      try {
        const response = await fetch(API_MODEL_TYPES_URL, { method: 'GET' });
        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error(`类型接口返回非 JSON（HTTP ${response.status}）`);
        }

        if (!response.ok || data.success === false) {
          throw new Error(data.message || `HTTP ${response.status}`);
        }

        populateModelTypeOptions(Array.isArray(data.data) ? data.data : []);
      } catch (error) {
        select.innerHTML = '<option value="">加载失败</option>';
        select.value = '';
        setModelTypeHint(`类型列表加载失败：${error.message}`);
      } finally {
        select.disabled = false;
      }
    }

    async function uploadModel({ confirmDuplicate = false, confirmExactMatch = false }) {
      const nameInput = document.getElementById('name');
      const modelTypeSelect = document.getElementById('modelTypeSelect');
      const ioInput = document.getElementById('ioFile');
      const glbInput = document.getElementById('glbFile');
      const manualInput = document.getElementById('manualFile');

      if (!modelTypeSelect.value) {
        throw new Error('当前没有可用类型，请先添加类型后再上传模型');
      }

      const formData = new FormData();
      formData.append('name', nameInput.value);
      formData.append('model_type_id', modelTypeSelect.value);
      formData.append('io_file', ioInput.files[0]);
      formData.append('glb_file', glbInput.files[0]);
      if (manualInput.files[0]) {
        formData.append('manual_file', manualInput.files[0]);
      }
      if (confirmDuplicate) {
        formData.append('confirm_duplicate', 'true');
      }
      if (confirmExactMatch) {
        formData.append('confirm_exact_match', 'true');
      }

      const response = await fetch(API_UPLOAD_URL, {
        method: 'POST',
        body: formData
      });

      let data = {};
      try {
        data = await response.json();
      } catch (_) {
        throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
      }

      if (!response.ok || !data.success) {
        const isDuplicateName = response.status === 409 && data.error === 'DUPLICATE_MODEL_NAME';
        const isExactPartsMatch = response.status === 409 && data.error === 'DUPLICATE_PARTS_MATCH';

        if (isDuplicateName && !confirmDuplicate) {
          const existingCount = data?.data?.existingCount ?? '未知';
          const confirmed = window.confirm(
            `已存在同名模型（${nameInput.value}），当前已有 ${existingCount} 条。是否继续上传？`
          );
          if (!confirmed) {
            throw new Error('你已取消上传');
          }
          return uploadModel({ confirmDuplicate: true, confirmExactMatch });
        }

        if (isExactPartsMatch && !confirmExactMatch) {
          const matchedCount = data?.data?.matchedCount ?? 0;
          const matchedModels = Array.isArray(data?.data?.matchedModels) ? data.data.matchedModels : [];
          const modelPreview = matchedModels.map((m) => `#${m.id} ${m.name}`).join('\n');
          const confirmed = window.confirm(
            `检测到零件类型和数量与现有模型完全一致（共 ${matchedCount} 条）。是否继续上传？` +
            (modelPreview ? `\n\n匹配模型：\n${modelPreview}` : '')
          );
          if (!confirmed) {
            throw new Error('你已取消上传');
          }
          return uploadModel({ confirmDuplicate, confirmExactMatch: true });
        }

        throw new Error(data.message || `HTTP ${response.status}`);
      }

      return data;
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const statusEl = document.getElementById('uploadStatus');
      const submitBtn = document.getElementById('uploadSubmitBtn');
      const startedAt = performance.now();

      submitBtn.disabled = true;
      setStatus(statusEl, 'loading', '正在上传文件，请稍候...');

      try {
        const data = await uploadModel({ confirmDuplicate: false, confirmExactMatch: false });
        setStatus(
          statusEl,
          'success',
          `上传成功\n模型 ID：${data.data.id}\n模型名称：${data.data.name}\n模型类型 ID：${data.data.modelTypeId || '无'}\n说明书地址：${data.data.manualUrl || '无'}\n调用耗时：${formatElapsed(startedAt)}`
        );
      } catch (error) {
        setStatus(statusEl, 'error', `上传失败\n错误信息：${error.message}\n调用耗时：${formatElapsed(startedAt)}`);
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.getElementById('btnCreateModelType').addEventListener('click', async () => {
      const statusEl = document.getElementById('createModelTypeStatus');
      const name = document.getElementById('createModelTypeName').value.trim();
      const startedAt = performance.now();

      if (!name) {
        setStatus(statusEl, 'error', '请填写类型名称');
        return;
      }

      setStatus(statusEl, 'loading', '正在添加类型...');

      try {
        const response = await fetch(API_CREATE_MODEL_TYPE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name })
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
        }

        setJsonOutput(data);

        if (!response.ok || !data.success) {
          setStatus(
            statusEl,
            'error',
            `添加失败\n错误信息：${data.message || `HTTP ${response.status}`}\n调用耗时：${formatElapsed(startedAt)}`
          );
          return;
        }

        await loadModelTypesForUpload();
        setStatus(
          statusEl,
          'success',
          `添加成功\n类型 ID：${data.data.id}\n类型名称：${data.data.name}\n调用耗时：${formatElapsed(startedAt)}`
        );
      } catch (error) {
        setStatus(statusEl, 'error', `添加失败\n错误信息：${error.message}\n调用耗时：${formatElapsed(startedAt)}`);
      }
    });

    async function callPostApi(url, payload) {
      const statusEl = document.getElementById('apiStatus');
      const startedAt = performance.now();
      setStatus(statusEl, 'loading', `请求中：POST ${url}`);

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
        }

        setJsonOutput(data);

        if (!response.ok || data.success === false) {
          setStatus(statusEl, 'error', `请求失败（HTTP ${response.status}）\n调用耗时：${formatElapsed(startedAt)}`);
          return;
        }

        setStatus(statusEl, 'success', `请求成功（HTTP ${response.status}）\n调用耗时：${formatElapsed(startedAt)}`);
      } catch (error) {
        setJsonOutput({ success: false, message: error.message });
        setStatus(statusEl, 'error', `请求失败\n错误信息：${error.message}\n调用耗时：${formatElapsed(startedAt)}`);
      }
    }

    async function confirmAndClearData({ url, payload, confirmText, successText, onSuccess }) {
      const statusEl = document.getElementById('apiStatus');
      const confirmed = window.confirm(confirmText);
      if (!confirmed) {
        setStatus(statusEl, 'error', '你已取消本次清理操作');
        return;
      }

      await callPostApi(url, payload);

      const output = document.getElementById('apiJsonOutput').textContent;
      try {
        const parsed = JSON.parse(output || '{}');
        if (parsed.success) {
          setStatus(statusEl, 'success', successText);
          if (typeof onSuccess === 'function') {
            await onSuccess(parsed);
          }
        }
      } catch (_) {
        // Ignore JSON parse failure because callPostApi already handles display.
      }
    }

    async function callPostMultipartApi(url, formData) {
      const statusEl = document.getElementById('apiStatus');
      const startedAt = performance.now();
      setStatus(statusEl, 'loading', `请求中：POST ${url}`);

      try {
        const response = await fetch(url, {
          method: 'POST',
          body: formData
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
        }

        setJsonOutput(data);

        if (!response.ok || data.success === false) {
          setStatus(statusEl, 'error', `请求失败（HTTP ${response.status}）\n调用耗时：${formatElapsed(startedAt)}`);
          return;
        }

        setStatus(statusEl, 'success', `请求成功（HTTP ${response.status}）\n调用耗时：${formatElapsed(startedAt)}`);
      } catch (error) {
        setJsonOutput({ success: false, message: error.message });
        setStatus(statusEl, 'error', `请求失败\n错误信息：${error.message}\n调用耗时：${formatElapsed(startedAt)}`);
      }
    }

    document.getElementById('btnOpenSwaggerUi').addEventListener('click', () => {
      window.open(SWAGGER_UI_URL, '_blank', 'noopener');
    });

    document.getElementById('btnClearModels').addEventListener('click', async () => {
      const deleteFiles = document.getElementById('deleteModelFilesInput').checked;
      await confirmAndClearData({
        url: API_CLEAR_MODELS_URL,
        payload: { deleteFiles },
        confirmText: deleteFiles
          ? '确定要清空所有模型数据，并删除模型上传文件吗？此操作不可恢复。'
          : '确定要清空所有模型数据吗？此操作不可恢复。',
        successText: deleteFiles ? '模型数据和模型文件清理请求已完成' : '模型数据清理请求已完成',
        onSuccess: async () => {
          await loadModelTypesForUpload();
        }
      });
    });

    document.getElementById('btnClearModelTypes').addEventListener('click', async () => {
      await confirmAndClearData({
        url: API_CLEAR_MODEL_TYPES_URL,
        payload: {},
        confirmText: '确定要清空所有类型数据吗？模型上的类型关联会被清空。此操作不可恢复。',
        successText: '类型数据清理请求已完成',
        onSuccess: async () => {
          await loadModelTypesForUpload();
        }
      });
    });

    document.getElementById('btnClearUsers').addEventListener('click', async () => {
      await confirmAndClearData({
        url: API_CLEAR_USERS_URL,
        payload: {},
        confirmText: '确定要清空所有用户数据吗？此操作不可恢复。',
        successText: '用户数据清理请求已完成'
      });
    });

    document.getElementById('btnDeleteModelById').addEventListener('click', async () => {
      const id = Number(document.getElementById('deleteModelIdInput').value);
      const deleteFiles = document.getElementById('deleteModelFilesInput').checked;
      const statusEl = document.getElementById('apiStatus');

      if (!Number.isInteger(id) || id <= 0) {
        setStatus(statusEl, 'error', '请输入合法的模型 ID（正整数）');
        return;
      }

      await confirmAndClearData({
        url: API_DELETE_MODEL_URL,
        payload: { id, deleteFiles },
        confirmText: deleteFiles
          ? `确定要删除模型 ID=${id}，并删除对应模型文件吗？此操作不可恢复。`
          : `确定要删除模型 ID=${id} 吗？此操作不可恢复。`,
        successText: deleteFiles ? `模型 ID=${id} 及其文件删除请求已完成` : `模型 ID=${id} 删除请求已完成`
      });
    });

    document.getElementById('btnDeleteModelTypeById').addEventListener('click', async () => {
      const id = Number(document.getElementById('deleteModelTypeIdInput').value);
      const statusEl = document.getElementById('apiStatus');

      if (!Number.isInteger(id) || id <= 0) {
        setStatus(statusEl, 'error', '请输入合法的类型 ID（正整数）');
        return;
      }

      await confirmAndClearData({
        url: API_DELETE_MODEL_TYPE_URL,
        payload: { id },
        confirmText: `确定要删除类型 ID=${id} 吗？关联模型的类型字段会被清空。此操作不可恢复。`,
        successText: `类型 ID=${id} 删除请求已完成`,
        onSuccess: async () => {
          await loadModelTypesForUpload();
        }
      });
    });

    document.getElementById('btnDeleteUserById').addEventListener('click', async () => {
      const id = document.getElementById('deleteUserIdInput').value.trim();
      const statusEl = document.getElementById('apiStatus');

      if (!id) {
        setStatus(statusEl, 'error', '请输入用户 ID');
        return;
      }

      await confirmAndClearData({
        url: API_DELETE_USER_URL,
        payload: { id },
        confirmText: `确定要删除用户 ID=${id} 吗？此操作不可恢复。`,
        successText: `用户 ID=${id} 删除请求已完成`
      });
    });

    document.getElementById('btnImageMatch').addEventListener('click', async () => {
      const imageUrl = document.getElementById('imageMatchUrlInput').value.trim();
      const imageFileInput = document.getElementById('imageMatchFileInput');
      const imageFile = imageFileInput.files[0];
      const minConfidence = document.getElementById('imageMatchMinConfidenceInput').value;
      const topK = document.getElementById('imageMatchTopKInput').value;
      const includeModelDetail = document.getElementById('imageMatchIncludeModelDetailInput').checked;
      const statusEl = document.getElementById('apiStatus');

      if (!imageUrl && !imageFile) {
        setStatus(statusEl, 'error', '请填写图片 URL 或选择本地图片文件');
        return;
      }
      if (imageUrl && imageFile) {
        setStatus(statusEl, 'error', '图片 URL 和本地图片文件只能二选一');
        return;
      }

      if (imageFile) {
        const formData = new FormData();
        formData.append('image_file', imageFile);
        if (minConfidence !== '') {
          formData.append('min_confidence', minConfidence);
        }
        if (topK !== '') {
          formData.append('top_k', topK);
        }
        formData.append('include_model_detail', includeModelDetail ? 'true' : 'false');
        await callPostMultipartApi(API_RECOGNITION_IMAGE_MATCH_URL, formData);
        return;
      }

      const payload = { image_url: imageUrl };
      if (minConfidence !== '') {
        payload.min_confidence = Number(minConfidence);
      }
      if (topK !== '') {
        payload.top_k = Number(topK);
      }
      payload.include_model_detail = includeModelDetail;
      await callPostApi(API_RECOGNITION_IMAGE_MATCH_URL, payload);
    });
    document.getElementById('btnCreateModel').addEventListener('click', async () => {
      const statusEl = document.getElementById('createStatus');
      const name = document.getElementById('createName').value.trim();
      const partsRaw = document.getElementById('createParts').value;
      const startedAt = performance.now();

      if (!name) {
        setStatus(statusEl, 'error', '请填写模型名称');
        return;
      }

      let parts;
      try {
        parts = JSON.parse(partsRaw);
      } catch (e) {
        setStatus(statusEl, 'error', '零件列表 JSON 格式错误');
        return;
      }

      statusEl.className = 'status loading';
      statusEl.style.display = 'block';
      statusEl.textContent = '创建中...';

      try {
        const response = await fetch(API_CREATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, parts })
        });
        const data = await response.json();
        setJsonOutput(data);
        if (!response.ok || !data.success) {
          setStatus(statusEl, 'error', `创建失败：${data.message}\n耗时：${formatElapsed(startedAt)}`);
        } else {
          setStatus(statusEl, 'success', `创建成功\n模型 ID：${data.data.id}\n耗时：${formatElapsed(startedAt)}`);
        }
      } catch (e) {
        setStatus(statusEl, 'error', `请求失败：${e.message}`);
      }
    });

    loadModelTypesForUpload();
  </script>
</body>
</html>
