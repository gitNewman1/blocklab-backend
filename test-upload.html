<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockLab 模型上传测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 16px;
    }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background: #2c7a7b;
      color: #fff;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    #result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 4px;
      display: none;
      line-height: 1.6;
    }
    .success { background: #e8f5e9; border: 1px solid #c8e6c9; color: #1b5e20; }
    .error { background: #ffebee; border: 1px solid #ffcdd2; color: #b71c1c; }
    .loading { background: #e3f2fd; border: 1px solid #bbdefb; color: #0d47a1; }
    .hint { color: #666; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>BlockLab 模型上传</h1>
  <p class="hint">默认请求同域接口：<code>/api/admin/models/upload</code></p>

  <form id="uploadForm">
    <div class="form-group">
      <label for="name">模型名称</label>
      <input type="text" id="name" name="name" required placeholder="例如：蜗牛模型">
    </div>

    <div class="form-group">
      <label for="ioFile">.io 文件</label>
      <input type="file" id="ioFile" name="io_file" accept=".io" required>
    </div>

    <div class="form-group">
      <label for="glbFile">.glb 文件</label>
      <input type="file" id="glbFile" name="glb_file" accept=".glb" required>
    </div>

    <div class="form-group">
      <label for="thumbnail">缩略图（可选）</label>
      <input type="file" id="thumbnail" name="thumbnail" accept=".jpg,.jpeg,.png,.webp,image/*">
    </div>

    <button type="submit" id="submitBtn">上传</button>
  </form>

  <div id="result"></div>

  <script>
    const API_URL = '/api/admin/models/upload';

    function setResult(type, html) {
      const resultDiv = document.getElementById('result');
      resultDiv.className = type;
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = html;
    }

    async function uploadModel({ confirmDuplicate = false, confirmExactMatch = false }) {
      const nameInput = document.getElementById('name');
      const ioInput = document.getElementById('ioFile');
      const glbInput = document.getElementById('glbFile');
      const thumbnailInput = document.getElementById('thumbnail');

      const formData = new FormData();
      formData.append('name', nameInput.value);
      formData.append('io_file', ioInput.files[0]);
      formData.append('glb_file', glbInput.files[0]);
      if (thumbnailInput.files[0]) {
        formData.append('thumbnail', thumbnailInput.files[0]);
      }
      if (confirmDuplicate) {
        formData.append('confirm_duplicate', 'true');
      }
      if (confirmExactMatch) {
        formData.append('confirm_exact_match', 'true');
      }

      const response = await fetch(API_URL, {
        method: 'POST',
        body: formData
      });

      let data = {};
      try {
        data = await response.json();
      } catch (_) {
        throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
      }

      if (!response.ok || !data.success) {
        const isDuplicate = response.status === 409 && data.error === 'DUPLICATE_MODEL_NAME';
        const isExactMatch = response.status === 409 && data.error === 'DUPLICATE_PARTS_MATCH';
        if (isDuplicate && !confirmDuplicate) {
          const existingCount = data?.data?.existingCount ?? '未知';
          const msg = `已存在同名模型（${nameInput.value}），当前已有 ${existingCount} 条。是否继续上传？`;
          const confirmed = window.confirm(msg);
          if (!confirmed) {
            throw new Error('你已取消上传');
          }
          return uploadModel({ confirmDuplicate: true, confirmExactMatch });
        }
        if (isExactMatch && !confirmExactMatch) {
          const matchedCount = data?.data?.matchedCount ?? 0;
          const matchedModels = Array.isArray(data?.data?.matchedModels) ? data.data.matchedModels : [];
          const modelPreview = matchedModels
            .map((m) => `#${m.id} ${m.name}`)
            .join('\n');
          const msg = `检测到零件类型和数量与现有模型完全一致（共 ${matchedCount} 条）。是否继续上传？${
            modelPreview ? `\n\n匹配模型：\n${modelPreview}` : ''
          }`;
          const confirmed = window.confirm(msg);
          if (!confirmed) {
            throw new Error('你已取消上传');
          }
          return uploadModel({ confirmDuplicate, confirmExactMatch: true });
        }
        throw new Error(data.message || `HTTP ${response.status}`);
      }

      return data;
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '上传中...';
      setResult('loading', '正在上传文件，请稍候...');

      try {
        const data = await uploadModel({ confirmDuplicate: false, confirmExactMatch: false });
        setResult('success', `
          <h3>上传成功</h3>
          <p><strong>模型 ID：</strong>${data.data.id}</p>
          <p><strong>模型名称：</strong>${data.data.name}</p>
          <p><strong>.io 文件：</strong><a href="${data.data.ioFileUrl}" target="_blank">${data.data.ioFileUrl}</a></p>
          <p><strong>.glb 文件：</strong><a href="${data.data.model3dUrl}" target="_blank">${data.data.model3dUrl}</a></p>
          <p><strong>零件数量：</strong>${data.data.partsJson.length}</p>
          <p><strong>步骤数量：</strong>${data.data.stepsJson.length}</p>
        `);
      } catch (error) {
        setResult('error', `
          <h3>上传失败</h3>
          <p>错误信息：${error.message}</p>
        `);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '上传';
      }
    });
  </script>
</body>
</html>
