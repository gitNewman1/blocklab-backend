<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockLab 接口测试页</title>
  <style>
    :root {
      --primary: #2c7a7b;
      --border: #dcdcdc;
      --bg-soft: #f7f9fb;
      --ok-bg: #e8f5e9;
      --ok-bd: #c8e6c9;
      --ok-tx: #1b5e20;
      --err-bg: #ffebee;
      --err-bd: #ffcdd2;
      --err-tx: #b71c1c;
      --loading-bg: #e3f2fd;
      --loading-bd: #bbdefb;
      --loading-tx: #0d47a1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .hint {
      margin: 0 0 16px;
      color: #666;
      font-size: 13px;
    }

    .layout {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }

    .panel {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
      min-height: 640px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      background: var(--bg-soft);
      margin-bottom: 8px;
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-tag {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 12px;
      color: #334155;
      background: #fff;
      white-space: nowrap;
    }

    .api-inline {
      font-size: 13px;
      color: #334155;
      font-weight: normal;
      margin-left: 4px;
    }

    .api-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .api-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .api-row .btn-row {
      flex: none;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: var(--primary);
      color: #fff;
      padding: 9px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 4px;
      display: none;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .success { background: var(--ok-bg); border: 1px solid var(--ok-bd); color: var(--ok-tx); }
    .error { background: var(--err-bg); border: 1px solid var(--err-bd); color: var(--err-tx); }
    .loading { background: var(--loading-bg); border: 1px solid var(--loading-bd); color: var(--loading-tx); }

    .json-title {
      margin: 8px 0;
      font-size: 14px;
      color: #333;
      font-weight: bold;
    }

    .json-box {
      height: 540px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0f172a;
      color: #d1e7ff;
      padding: 10px;
      overflow-y: auto;
      overflow-x: auto;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre;
    }

    @media (max-width: 980px) {
      .layout {
        flex-direction: column;
      }

      .panel {
        min-height: auto;
      }

      .json-box {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>BlockLab 接口测试页</h1>
    <p class="hint">左侧：模型上传；右侧：模型查询接口测试（返回 JSON 可滚动查看）</p>

    <div class="layout">
      <section class="panel">
        <h2>左侧：文件上传</h2>

        <form id="uploadForm" class="card">
          <h3>上传模型文件</h3>

          <div class="form-group">
            <label for="name">模型名称</label>
            <input type="text" id="name" name="name" required placeholder="例如：蜗牛模型">
          </div>

          <div class="form-group">
            <label for="ioFile">.io 文件</label>
            <input type="file" id="ioFile" name="io_file" accept=".io" required>
          </div>

          <div class="form-group">
            <label for="glbFile">.glb 文件</label>
            <input type="file" id="glbFile" name="glb_file" accept=".glb" required>
          </div>

          <div class="form-group">
            <label for="thumbnail">缩略图（可选）</label>
            <input type="file" id="thumbnail" name="thumbnail" accept=".jpg,.jpeg,.png,.webp,image/*">
          </div>

          <button type="submit" id="uploadSubmitBtn">上传</button>
          <div id="uploadStatus" class="status"></div>
        </form>
      </section>

      <section class="panel">
        <h2>右侧：接口调用测试</h2>

        <div class="card">
          <div class="card-head">
            <h3>获取指定模型：<span class="api-inline">/api/models/:id</span></h3>
            <div class="card-tools">
              <button type="button" id="btnGetById">调用 GET</button>
            </div>
          </div>
          <div class="api-row">
            <div class="form-group">
              <label for="modelIdInput">模型 ID</label>
              <input type="number" id="modelIdInput" min="1" placeholder="例如：1">
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3>获取所有模型：<span class="api-inline">/api/models</span></h3>
            <div class="card-tools">
              <button type="button" id="btnGetAll">调用 GET</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <h3>匹配模型：<span class="api-inline">/api/recognition/match</span></h3>
            <div class="card-tools">
              <button type="button" id="btnMatchModels">调用 POST</button>
            </div>
          </div>
          <div class="form-group">
            <label for="matchPayloadInput">请求 JSON（零件名称+数量）</label>
            <textarea id="matchPayloadInput">{
  "parts": [
    { "name": "Brick 2 x 4", "quantity": 4 },
    { "name": "Plate 2 x 2", "quantity": 2 }
  ]
}</textarea>
          </div>
        </div>

        <div id="apiStatus" class="status"></div>
        <div class="json-title">接口返回 JSON</div>
        <pre id="apiJsonOutput" class="json-box">{}</pre>
      </section>
    </div>
  </div>

  <script>
    const API_UPLOAD_URL = '/api/admin/models/upload';
    const API_MODELS_URL = '/api/models';
    const API_RECOGNITION_MATCH_URL = '/api/recognition/match';

    function setStatus(el, type, text) {
      el.className = `status ${type}`;
      el.style.display = 'block';
      el.textContent = text;
    }

    function setJsonOutput(data) {
      const box = document.getElementById('apiJsonOutput');
      box.textContent = JSON.stringify(data, null, 2);
      box.scrollTop = 0;
      box.scrollLeft = 0;
    }

    async function uploadModel({ confirmDuplicate = false, confirmExactMatch = false }) {
      const nameInput = document.getElementById('name');
      const ioInput = document.getElementById('ioFile');
      const glbInput = document.getElementById('glbFile');
      const thumbnailInput = document.getElementById('thumbnail');

      const formData = new FormData();
      formData.append('name', nameInput.value);
      formData.append('io_file', ioInput.files[0]);
      formData.append('glb_file', glbInput.files[0]);
      if (thumbnailInput.files[0]) {
        formData.append('thumbnail', thumbnailInput.files[0]);
      }
      if (confirmDuplicate) {
        formData.append('confirm_duplicate', 'true');
      }
      if (confirmExactMatch) {
        formData.append('confirm_exact_match', 'true');
      }

      const response = await fetch(API_UPLOAD_URL, {
        method: 'POST',
        body: formData
      });

      let data = {};
      try {
        data = await response.json();
      } catch (_) {
        throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
      }

      if (!response.ok || !data.success) {
        const isDuplicateName = response.status === 409 && data.error === 'DUPLICATE_MODEL_NAME';
        const isExactPartsMatch = response.status === 409 && data.error === 'DUPLICATE_PARTS_MATCH';

        if (isDuplicateName && !confirmDuplicate) {
          const existingCount = data?.data?.existingCount ?? '未知';
          const confirmed = window.confirm(
            `已存在同名模型（${nameInput.value}），当前已有 ${existingCount} 条。是否继续上传？`
          );
          if (!confirmed) {
            throw new Error('你已取消上传');
          }
          return uploadModel({ confirmDuplicate: true, confirmExactMatch });
        }

        if (isExactPartsMatch && !confirmExactMatch) {
          const matchedCount = data?.data?.matchedCount ?? 0;
          const matchedModels = Array.isArray(data?.data?.matchedModels) ? data.data.matchedModels : [];
          const modelPreview = matchedModels.map((m) => `#${m.id} ${m.name}`).join('\n');
          const confirmed = window.confirm(
            `检测到零件类型和数量与现有模型完全一致（共 ${matchedCount} 条）。是否继续上传？` +
            (modelPreview ? `\n\n匹配模型：\n${modelPreview}` : '')
          );
          if (!confirmed) {
            throw new Error('你已取消上传');
          }
          return uploadModel({ confirmDuplicate, confirmExactMatch: true });
        }

        throw new Error(data.message || `HTTP ${response.status}`);
      }

      return data;
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const statusEl = document.getElementById('uploadStatus');
      const submitBtn = document.getElementById('uploadSubmitBtn');

      submitBtn.disabled = true;
      setStatus(statusEl, 'loading', '正在上传文件，请稍候...');

      try {
        const data = await uploadModel({ confirmDuplicate: false, confirmExactMatch: false });
        setStatus(
          statusEl,
          'success',
          `上传成功\n模型 ID：${data.data.id}\n模型名称：${data.data.name}`
        );
      } catch (error) {
        setStatus(statusEl, 'error', `上传失败\n错误信息：${error.message}`);
      } finally {
        submitBtn.disabled = false;
      }
    });

    async function callApi(url) {
      const statusEl = document.getElementById('apiStatus');
      setStatus(statusEl, 'loading', `请求中：${url}`);

      try {
        const response = await fetch(url, { method: 'GET' });
        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
        }

        setJsonOutput(data);

        if (!response.ok || data.success === false) {
          setStatus(statusEl, 'error', `请求失败（HTTP ${response.status}）`);
          return;
        }

        setStatus(statusEl, 'success', `请求成功（HTTP ${response.status}）`);
      } catch (error) {
        setJsonOutput({ success: false, message: error.message });
        setStatus(statusEl, 'error', `请求失败\n错误信息：${error.message}`);
      }
    }

    async function callPostApi(url, payload) {
      const statusEl = document.getElementById('apiStatus');
      setStatus(statusEl, 'loading', `请求中：POST ${url}`);

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error(`接口返回非 JSON（HTTP ${response.status}）`);
        }

        setJsonOutput(data);

        if (!response.ok || data.success === false) {
          setStatus(statusEl, 'error', `请求失败（HTTP ${response.status}）`);
          return;
        }

        setStatus(statusEl, 'success', `请求成功（HTTP ${response.status}）`);
      } catch (error) {
        setJsonOutput({ success: false, message: error.message });
        setStatus(statusEl, 'error', `请求失败\n错误信息：${error.message}`);
      }
    }

    document.getElementById('btnGetById').addEventListener('click', async () => {
      const idVal = document.getElementById('modelIdInput').value;
      const modelId = Number(idVal);
      if (!Number.isInteger(modelId) || modelId <= 0) {
        const statusEl = document.getElementById('apiStatus');
        setStatus(statusEl, 'error', '请输入合法的模型 ID（正整数）');
        return;
      }
      await callApi(`${API_MODELS_URL}/${modelId}`);
    });

    document.getElementById('btnGetAll').addEventListener('click', async () => {
      await callApi(API_MODELS_URL);
    });

    document.getElementById('btnMatchModels').addEventListener('click', async () => {
      const input = document.getElementById('matchPayloadInput').value;
      try {
        const payload = JSON.parse(input);
        await callPostApi(API_RECOGNITION_MATCH_URL, payload);
      } catch (error) {
        const statusEl = document.getElementById('apiStatus');
        setStatus(statusEl, 'error', `请求 JSON 解析失败\n错误信息：${error.message}`);
      }
    });
  </script>
</body>
</html>
